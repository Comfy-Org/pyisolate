name: Build Wheels

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: build-wheels-${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  verify-release-artifacts:
    name: Verify Release Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verification tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu-latest-py3.11
          path: artifacts

      - name: Verify artifact presence
        shell: bash
        run: |
          wheel_count="$(find artifacts -maxdepth 1 -type f -name '*.whl' | wc -l)"
          sdist_count="$(find artifacts -maxdepth 1 -type f -name '*.tar.gz' | wc -l)"
          if [ "$wheel_count" -eq 0 ] || [ "$sdist_count" -eq 0 ]; then
            echo "Expected at least one wheel and one sdist before publish."
            exit 1
          fi
          ls -l artifacts

      - name: Validate distribution metadata
        run: python -m twine check artifacts/*

      - name: Install wheel and run smoke test
        shell: bash
        run: |
          python -m venv .wheel-venv
          source .wheel-venv/bin/activate
          python -m pip install --upgrade pip

          wheel_path="$(find artifacts -type f -name '*.whl' | head -n 1)"
          if [ -z "$wheel_path" ]; then
            echo "No wheel artifact found."
            exit 1
          fi
          python -m pip install "$wheel_path"
          python -c "import pyisolate; print(pyisolate.__version__)"

      - name: Install sdist and run smoke test
        shell: bash
        run: |
          python -m venv .sdist-venv
          source .sdist-venv/bin/activate
          python -m pip install --upgrade pip

          sdist_path="$(find artifacts -type f -name '*.tar.gz' | head -n 1)"
          if [ -z "$sdist_path" ]; then
            echo "No sdist artifact found."
            exit 1
          fi
          python -m pip install "$sdist_path"
          python -c "import pyisolate; print(pyisolate.__version__)"

  publish:
    name: Publish To PyPI (Trusted Publishing)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build, verify-release-artifacts]
    if: >-
      github.repository == 'Comfy-Org/pyisolate' &&
      github.event_name == 'release' &&
      github.event.action == 'published' &&
      github.event.release.tag_name != '' &&
      startsWith(github.event.release.tag_name, 'v')
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: publish-pypi-${{ github.event.release.tag_name }}
      cancel-in-progress: false

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-ubuntu-latest-py3.11
          path: dist

      - name: Verify distributions
        shell: bash
        run: |
          wheel_count="$(find dist -maxdepth 1 -type f -name '*.whl' | wc -l)"
          sdist_count="$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l)"
          if [ "$wheel_count" -eq 0 ] || [ "$sdist_count" -eq 0 ]; then
            echo "Expected at least one wheel and one sdist for publish."
            exit 1
          fi

          ls -l dist

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
